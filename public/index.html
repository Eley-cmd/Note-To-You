<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f2f7f3">
  <title>Note To You</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍵</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ─── Login Page ───────────────────────────────────────────── -->
<div id="login-page" style="display:none;pointer-events:none;position:fixed;inset:0;z-index:999">
  <div class="login-card">
    <span class="login-emblem">🍵</span>
    <h1>Note To You</h1>
    <p>A quiet place to share thoughts</p>
    <a href="/auth/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </a>
  </div>
</div>

<!-- ─── App Page ─────────────────────────────────────────────── -->
<div id="app-page" style="display:none">

  <header>
    <div class="header-inner">
      <div class="header-brand" onclick="showFeed()">
        <span class="emblem">🍵</span>
        <h1>Note To You</h1>
      </div>
      <div class="header-search">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search notes…" oninput="handleSearch(this.value)">
      </div>
      <div class="header-right">
        <span class="live-dot" title="Live updates on"></span>
        <button class="btn-icon" id="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
        <img id="header-avatar-img" src="" alt="" class="user-avatar" style="display:none" onclick="showProfile()">
        <div id="header-avatar-placeholder" class="user-avatar-placeholder" style="display:none" onclick="showProfile()"></div>
        <a href="/auth/logout" class="btn-logout">Log Out</a>
      </div>
    </div>
  </header>

  <div class="nav-tabs-wrapper">
    <div class="nav-tabs" style="max-width:860px;margin:0 auto;width:100%;padding:0 24px;">
      <button class="nav-tab active" id="tab-feed" onclick="switchTab('feed')">🏠 Feed</button>
      <button class="nav-tab" id="tab-pinned" onclick="switchTab('pinned')">📌 Pinned</button>
      <button class="nav-tab" id="tab-calendar" onclick="switchTab('calendar')">📅 Calendar</button>
      <button class="nav-tab" id="tab-profile" onclick="showProfile()">👤 Profile</button>
    </div>
  </div>

  <main>

    <!-- Feed View -->
    <div id="feed-view">
      <!-- Compose -->
      <div class="compose-box">
        <span class="compose-label">New Note</span>
        <textarea id="note-textarea" placeholder="What's on your mind?" maxlength="2000"></textarea>
        <div id="media-preview" class="media-preview"></div>

        <!-- Color picker -->
        <div class="color-picker">
          <span class="color-picker-label">Color:</span>
          <div class="color-dot selected" data-color="default" onclick="selectColor('default')"></div>
          <div class="color-dot" data-color="rose" onclick="selectColor('rose')"></div>
          <div class="color-dot" data-color="sky" onclick="selectColor('sky')"></div>
          <div class="color-dot" data-color="lemon" onclick="selectColor('lemon')"></div>
          <div class="color-dot" data-color="lavender" onclick="selectColor('lavender')"></div>
          <div class="color-dot" data-color="peach" onclick="selectColor('peach')"></div>
          <div class="color-dot" data-color="sage" onclick="selectColor('sage')"></div>
        </div>

        <!-- Tags input -->
        <div class="tags-input-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-faint)" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <input type="text" id="tags-input" placeholder="Tags: work, ideas, personal (comma separated)">
        </div>

        <div class="compose-footer">
          <div class="compose-actions-left">
            <label for="media-input" class="btn-media">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              Photo / Video
            </label>
            <input type="file" id="media-input" accept="image/*,video/*" multiple>
            <span id="char-count" class="char-count">0 / 2000</span>
          </div>
          <button id="post-btn" class="btn-post" onclick="postNote()" disabled>Post</button>
        </div>
      </div>

      <!-- Tags filter -->
      <div id="tags-bar" class="tags-bar" style="display:none"></div>

      <!-- Feed -->
      <div class="feed-header">
        <span class="feed-title">All Notes</span>
        <span id="notes-count" class="feed-count"></span>
      </div>
      <div id="notes-feed" class="notes-feed">
        <div class="loading"><div class="loading-spinner"></div>Loading notes…</div>
      </div>
    </div>

    <!-- Pinned View -->
    <div id="pinned-view" style="display:none">
      <div class="feed-header">
        <span class="feed-title">📌 Pinned Notes</span>
        <span id="pinned-count" class="feed-count"></span>
      </div>
      <div id="pinned-feed" class="notes-feed">
        <div class="loading"><div class="loading-spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- Calendar View -->
    <div id="calendar-view" style="display:none">
      <div class="calendar-grid" id="calendar-grid"></div>
      <div class="feed-header">
        <span class="feed-title" id="cal-selected-label">Select a day</span>
      </div>
      <div id="cal-notes-feed" class="notes-feed"></div>
    </div>

    <!-- Profile View -->
    <div id="profile-page" style="display:none">
      <button class="btn-back" onclick="showFeed()">← Back to Feed</button>
      <div class="profile-header" id="profile-header"></div>
      <div class="feed-header">
        <span class="feed-title">Notes</span>
        <span id="profile-notes-count" class="feed-count"></span>
      </div>
      <div id="profile-feed" class="notes-feed"></div>
    </div>

  </main>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
